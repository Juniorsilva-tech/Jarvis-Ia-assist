<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>JARVIS</title>
<style>
:root{--bg:#0a0c10;--surface:#111318;--border:#1e2330;--accent:#00d4ff;--accent2:#7c3aed;--text:#e2e8f0;--muted:#64748b;--user:#1e2d45;--ai:#141a24;--ok:#10b981;--err:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.left{display:flex;align-items:center;gap:12px}
.logo{font-size:18px;font-weight:700;letter-spacing:3px;color:var(--accent);text-shadow:0 0 20px rgba(0,212,255,.4)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite}
.dot.think{background:var(--accent);animation:fast .6s infinite}
.dot.offline{background:var(--err);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fast{0%,100%{opacity:1}50%{opacity:.3}}
.tag{font-size:11px;color:var(--muted);background:var(--border);padding:2px 8px;border-radius:20px}
.ollama-badge{font-size:10px;padding:2px 7px;border-radius:20px;background:#0d2d0d;color:var(--ok);border:1px solid #1a4a1a}
.ollama-badge.off{background:#2d0d0d;color:var(--err);border-color:#4a1a1a}
#clock{font-size:13px;color:var(--muted)}
.chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.msg{display:flex;gap:10px;max-width:80%;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.ai{align-self:flex-start}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg.user .av{background:var(--accent2)}
.msg.ai .av{background:linear-gradient(135deg,#0a1628,#0e2040);border:1px solid var(--accent);color:var(--accent);font-weight:700;font-size:11px;letter-spacing:1px}
.bubble{padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
.msg.user .bubble{background:var(--user);border-radius:16px 4px 16px 16px}
.msg.ai .bubble{background:var(--ai);border:1px solid var(--border);border-radius:4px 16px 16px 16px}
.bubble pre{background:#0d1117;border:1px solid #1e2330;border-radius:8px;padding:10px;margin-top:6px;overflow-x:auto;font-family:Consolas,monospace;font-size:12px;color:#7dd3fc;white-space:pre}
.bubble code{background:#0d1117;padding:1px 5px;border-radius:4px;font-family:Consolas,monospace;font-size:12px;color:#7dd3fc}
.dots{display:flex;gap:4px;align-items:center;padding:4px 0}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:dot 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.inputbar{padding:14px 20px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-shrink:0}
#inp{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px 16px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
#inp:focus{border-color:var(--accent)}
#inp::placeholder{color:var(--muted)}
.btn{background:var(--accent);color:#000;border:none;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s;flex-shrink:0}
.btn:hover{opacity:.85}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.mic{background:var(--border);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:16px;cursor:pointer;transition:all .2s;flex-shrink:0}
.mic:hover{border-color:var(--accent);color:var(--accent)}
.mic.rec{background:var(--err);color:#fff;border-color:var(--err);animation:fast .6s infinite}
</style>
</head>
<body>
<div class="topbar">
  <div class="left">
    <div class="logo">JARVIS</div>
    <div class="dot" id="dot"></div>
    <span class="tag" id="tag">online</span>
    <span class="ollama-badge off" id="ollamaBadge">Ollama off</span>
  </div>
  <div class="left">
    <span id="clock"></span>
  </div>
</div>
<div class="chat" id="chat"></div>
<div class="inputbar">
  <button class="mic" id="mic" title="Clique para falar">🎤</button>
  <input id="inp" type="text" placeholder="Digite ou fale 'Jarvis [comando]'..." autocomplete="off"/>
  <button class="btn" id="sendBtn" onclick="send()">Enviar</button>
</div>
<script>
const chat=document.getElementById('chat'),inp=document.getElementById('inp'),
      sendBtn=document.getElementById('sendBtn'),dot=document.getElementById('dot'),
      tag=document.getElementById('tag'),mic=document.getElementById('mic'),
      badge=document.getElementById('ollamaBadge');

function clock(){
  const n=new Date();
  document.getElementById('clock').textContent=
    n.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})+' · '+n.toLocaleDateString('pt-BR');
}
clock(); setInterval(clock,10000);

function checkStatus(){
  fetch('/status').then(r=>r.json()).then(d=>{
    if(d.ollama){badge.textContent='Ollama online';badge.className='ollama-badge';}
    else{badge.textContent='Ollama off';badge.className='ollama-badge off';}
  }).catch(()=>{});
}
checkStatus(); setInterval(checkStatus,15000);

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function addMsg(who,text){
  const w=document.createElement('div'); w.className=`msg ${who}`;
  const av=document.createElement('div'); av.className='av'; av.textContent=who==='ai'?'J':'👤';
  const b=document.createElement('div'); b.className='bubble';
  const html=text
    .replace(/```(\w*)\n?([\s\S]*?)```/g,(_,l,c)=>`<pre>${esc(c.trim())}</pre>`)
    .replace(/`([^`]+)`/g,(_,c)=>`<code>${esc(c)}</code>`);
  b.innerHTML=html;
  w.appendChild(av); w.appendChild(b); chat.appendChild(w);
  chat.scrollTop=chat.scrollHeight;
}

function showThink(){
  const w=document.createElement('div'); w.className='msg ai'; w.id='think';
  const av=document.createElement('div'); av.className='av'; av.textContent='J';
  const b=document.createElement('div'); b.className='bubble';
  b.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';
  w.appendChild(av); w.appendChild(b); chat.appendChild(w);
  chat.scrollTop=chat.scrollHeight;
}
function hideThink(){const t=document.getElementById('think');if(t)t.remove();}

async function send(){
  const msg=inp.value.trim(); if(!msg) return;
  inp.value=''; sendBtn.disabled=true;
  addMsg('user',msg); showThink();
  dot.className='dot think'; tag.textContent='processando...';
  try{
    const res=await fetch('/jarvis',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    const d=await res.json();
    hideThink(); addMsg('ai',d.response||'Sem resposta.');
    dot.className='dot'; tag.textContent='online';
  }catch(e){
    hideThink(); addMsg('ai','Erro de conexão com o servidor.');
    dot.className='dot offline'; tag.textContent='erro';
  }finally{sendBtn.disabled=false; inp.focus();}
}
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey)send();});

// Wake word polling (pega comandos de voz do servidor)
setInterval(()=>{
  fetch('/wake_poll').then(r=>r.json()).then(d=>{
    if(d.messages&&d.messages.length){
      d.messages.forEach(m=>{addMsg('user','🎤 '+m.user); addMsg('ai',m.response);});
    }
  }).catch(()=>{});
},1500);

// Microfone via Web Speech API (Chrome)
let rec=null;
if('webkitSpeechRecognition'in window||'SpeechRecognition'in window){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  rec=new SR(); rec.lang='pt-BR'; rec.continuous=false; rec.interimResults=false;
  rec.onresult=e=>{inp.value=e.results[0][0].transcript; mic.className='mic'; mic.textContent='🎤'; send();};
  rec.onerror=()=>{mic.className='mic'; mic.textContent='🎤';};
  rec.onend=()=>{mic.className='mic'; mic.textContent='🎤';};
}
mic.addEventListener('click',()=>{
  if(!rec){addMsg('ai','Use o Chrome para reconhecimento de voz.');return;}
  if(mic.classList.contains('rec')){rec.stop();}
  else{mic.className='mic rec'; mic.textContent='⏹'; rec.start();}
});

// Greet
const h=new Date().getHours();
addMsg('ai',`${h<12?'Bom dia':h<18?'Boa tarde':'Boa noite'}! Jarvis v5 online. Diga "Jarvis [comando]" ou use o microfone.`);
inp.focus();
</script>
</body>
</html>
